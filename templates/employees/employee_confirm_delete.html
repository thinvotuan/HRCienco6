{% extends 'base.html' %}

{% block title %}Xóa nhân viên - Cienco6 HR{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-danger text-white fw-semibold">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>Xác nhận xóa
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-person-x-fill text-danger" style="font-size:4rem"></i>
                <h4 class="mt-3">Bạn có chắc muốn xóa?</h4>
                <p class="text-muted">Nhân viên: <strong>{{ object.full_name }}</strong> ({{ object.employee_id }})</p>
                <p class="text-danger small">Hành động này không thể hoàn tác!</p>
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4 me-2">
                        <i class="bi bi-trash-fill me-1"></i>Xóa
                    </button>
                    <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary px-4">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
